<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Map — TerraMine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #0D1B2A;
      --cyan:    #4FC3F7;
      --white:   #F0F4FF;
      --gray:    #8899AA;
      --surface: rgba(255,255,255,0.03);
      --border:  rgba(255,255,255,0.08);
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }

    nav {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; background: rgba(13,27,42,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); z-index: 20;
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--cyan); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    nav a.back { color: var(--gray); text-decoration: none; font-size: 13px; transition: color 0.2s; }
    nav a.back:hover { color: var(--white); }
    .nav-cta { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1.5px; color: var(--navy); background: var(--cyan); padding: 7px 16px; border-radius: 4px; text-decoration: none; transition: opacity 0.2s; }
    .nav-cta:hover { opacity: 0.85; }

    .toolbar {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; padding: 10px 20px;
      background: rgba(13,27,42,0.9); border-bottom: 1px solid var(--border); z-index: 15;
    }
    .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--cyan); }
    .stat-pill { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--gray); }
    .stat-pill strong { color: var(--white); font-size: 13px; }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--gray); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--cyan); color: var(--white); }
    .filter-btn.active { background: rgba(79,195,247,0.15); border-color: var(--cyan); color: var(--cyan); }
    .filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-rock    { background: #90CAF9; }
    .dot-coal    { background: #B0BEC5; }
    .dot-gold    { background: #FFD54F; }
    .dot-diamond { background: #80DEEA; }

    .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .view-btn { padding: 5px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--gray); border: none; cursor: pointer; transition: all 0.15s; }
    .view-btn.active { background: rgba(79,195,247,0.2); color: var(--cyan); }

    #map { flex: 1; width: 100%; min-height: 0; }

    #loading-overlay {
      position: absolute; inset: 0; background: var(--navy);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      z-index: 50; transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-icon { font-size: 40px; animation: spin 1.5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: var(--cyan); }
    .loading-sub { font-size: 13px; color: var(--gray); }

    #legend {
      position: absolute; bottom: 28px; left: 16px;
      background: rgba(13,27,42,0.92); backdrop-filter: blur(10px);
      border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; z-index: 10; min-width: 160px;
    }
    .legend-title { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; color: var(--cyan); margin-bottom: 10px; }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray); margin-bottom: 6px; }
    .legend-gradient { width: 100%; height: 8px; border-radius: 4px; background: linear-gradient(to right, #0000ff88, #00ff0099, #ffff00bb, #ff0000); margin-bottom: 4px; }
    .legend-gradient-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--gray); }

    #error-banner { display: none; position: absolute; top: 0; left: 0; right: 0; background: rgba(224,80,80,0.15); border-bottom: 1px solid rgba(224,80,80,0.3); padding: 10px 20px; font-size: 13px; color: #F48FB1; z-index: 40; text-align: center; }

    .map-footer { flex-shrink: 0; text-align: center; padding: 8px; font-size: 11px; color: var(--gray); background: rgba(13,27,42,0.9); border-top: 1px solid var(--border); }
    .map-footer a { color: var(--cyan); text-decoration: none; }

    @media (max-width: 600px) {
      nav { padding: 12px 16px; }
      .toolbar { padding: 8px 12px; }
      #legend { bottom: 48px; left: 8px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">⛏ TerraMine</a>
    <div class="nav-right">
      <a class="back" href="index.html">← Home</a>
      <a class="nav-cta" href="https://terramine.app">Play Free</a>
    </div>
  </nav>

  <div class="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">World Map</span>
      <div class="stat-pill">⛏ <strong id="stat-total">—</strong> properties</div>
      <div class="stat-pill">📍 <strong id="stat-cities">—</strong> areas</div>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div class="filters" id="filters">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="rock"><span class="dot dot-rock"></span>Rock</button>
        <button class="filter-btn" data-type="coal"><span class="dot dot-coal"></span>Coal</button>
        <button class="filter-btn" data-type="gold"><span class="dot dot-gold"></span>Gold</button>
        <button class="filter-btn" data-type="diamond"><span class="dot dot-diamond"></span>Diamond</button>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-heat">Heatmap</button>
        <button class="view-btn" id="btn-dots">Dots</button>
      </div>
    </div>
  </div>

  <div style="position:relative; flex:1; min-height:0; display:flex; flex-direction:column;">
    <div id="map"></div>

    <div id="loading-overlay">
      <span class="loading-icon">⛏</span>
      <div class="loading-text">Loading Claims</div>
      <div class="loading-sub">Fetching property data…</div>
    </div>

    <div id="error-banner"></div>

    <div id="legend">
      <div class="legend-title">Density</div>
      <div class="legend-gradient"></div>
      <div class="legend-gradient-labels"><span>Low</span><span>High</span></div>
    </div>
  </div>

  <div class="map-footer">
    <span id="freshness-note">Loading…</span> &nbsp;·&nbsp; <a href="index.html">terramine.app</a>
  </div>

  <script>
    // ── Data source ────────────────────────────────────────────────────────
    // Jul 17, 2026: this used to run a live Firestore collection scan
    // (window.db.collection('properties').get()) directly from the browser —
    // 100K+ document reads on EVERY page load, by EVERY visitor, no auth
    // wall. Replaced with a fetch to a Cloud Function that serves a small
    // precomputed/grid-bucketed cache, regenerated server-side every 30 min.
    // See functions/src/index.ts: refreshHeatmapCache + getHeatmapData.
    //
    // ⚠️ REPLACE with the real URL after running `firebase deploy --only
    // functions` — the Firebase CLI prints each function's URL at the end of
    // the deploy. It'll look like https://getheatmapdata-xxxxxxxxxx-uc.a.run.app
    // or https://us-central1-terramine-5cda5.cloudfunctions.net/getHeatmapData.
    const HEATMAP_DATA_URL = 'https://us-central1-terramine-5cda5.cloudfunctions.net/getHeatmapData';

    // Jul 17, 2026: once a player zooms in close enough to see individual
    // TerraAcres, the aggregate cache is too coarse to be useful — this
    // fetches exact properties within the current viewport instead, scoped
    // to whatever's on screen (never the whole dataset). See
    // functions/src/index.ts: getPropertiesInViewport.
    const VIEWPORT_DATA_URL = 'https://us-central1-terramine-5cda5.cloudfunctions.net/getPropertiesInViewport';
    const VIEWPORT_QUERY_MIN_ZOOM = 16; // roughly block/building-level zoom

    // ── State ──────────────────────────────────────────────────────────────
    let map, canvasOverlay;
    let heatCells      = [];    // active points being rendered: { lat, lng, rock, coal, gold, diamond }
    let aggregateCells = [];    // the cached, grid-bucketed points — kept around so switching zoom back out doesn't need a re-fetch
    let heatmapMeta    = null;  // { generatedAt, totalsByType, cellSizeDegrees, totalProperties }
    let dataMode       = 'aggregate'; // 'aggregate' (cached, whole-world) | 'viewport' (live, precise, close zoom only)
    let viewportFetchTimer = null;
    let viewportFetchToken = 0; // guards against a slower, older request overwriting a newer one
    let activeFilter  = 'all';
    let viewMode      = 'heat';
    let dotMarkers    = [];

    const MINE_COLORS = {
      rock:    '#90CAF9',
      coal:    '#B0BEC5',
      gold:    '#FFD54F',
      diamond: '#80DEEA',
    };

    // ── Custom canvas heatmap overlay ──────────────────────────────────────
    class HeatCanvas {
      constructor(map) {
        this._map    = map;
        this._points = [];
        this._canvas = document.createElement('canvas');
        this._canvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
        this._pane = map.getPanes ? null : null; // set after overlay init
        this._overlay = new google.maps.OverlayView();
        this._overlay.onAdd    = () => {
          this._overlay.getPanes().overlayLayer.appendChild(this._canvas);
        };
        this._overlay.onRemove = () => { this._canvas.parentNode && this._canvas.parentNode.removeChild(this._canvas); };
        this._overlay.draw     = () => this._draw();
        this._overlay.setMap(map);
      }

      setPoints(pts) { this._points = pts; this._overlay.draw(); }
      remove() { this._overlay.setMap(null); }

      _draw() {
        const proj = this._overlay.getProjection();
        if (!proj || !this._points.length) return;

        const bounds = this._map.getBounds();
        if (!bounds) return;

        const ne = proj.fromLatLngToDivPixel(bounds.getNorthEast());
        const sw = proj.fromLatLngToDivPixel(bounds.getSouthWest());

        const w = Math.abs(ne.x - sw.x);
        const h = Math.abs(ne.y - sw.y);
        this._canvas.width  = w;
        this._canvas.height = h;
        this._canvas.style.width  = w + 'px';
        this._canvas.style.height = h + 'px';
        this._canvas.style.left   = Math.min(ne.x, sw.x) + 'px';
        this._canvas.style.top    = Math.min(ne.y, sw.y) + 'px';

        const ctx   = this._canvas.getContext('2d', { willReadFrequently: true });
        const zoom  = this._map.getZoom();
        const r     = Math.max(8, Math.min(60, zoom * 3.5));

        ctx.clearRect(0, 0, w, h);

        // Points are now grid cells with a `weight` (property count in that
        // cell), not individual properties — so each blob's intensity scales
        // with how many properties are in that cell instead of every blob
        // being identical. Capped + sqrt'd so one huge outlier cell doesn't
        // wash out everywhere else on the map (diminishing visual returns
        // past a point, same as real heatmap libraries do).
        this._points.forEach(p => {
          const px = proj.fromLatLngToDivPixel(new google.maps.LatLng(p.lat, p.lng));
          const x  = px.x - Math.min(ne.x, sw.x);
          const y  = px.y - Math.min(ne.y, sw.y);
          const intensity = Math.min(1, Math.sqrt(p.weight) / Math.sqrt(40));
          const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
          grad.addColorStop(0,   `rgba(255,60,0,${0.15 + intensity * 0.35})`);
          grad.addColorStop(0.4, `rgba(255,180,0,${0.08 + intensity * 0.18})`);
          grad.addColorStop(1,   'rgba(0,0,0,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        });

        // Colorize via compositing — map luminance → heatmap color
        const imageData = ctx.getImageData(0, 0, w, h);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const alpha = data[i + 3];
          if (alpha === 0) continue;
          const t = alpha / 255;
          // blue → green → yellow → red
          let r2, g2, b2;
          if      (t < 0.33) { r2 = 0;   g2 = Math.round(t/0.33*255); b2 = 255; }
          else if (t < 0.66) { r2 = Math.round((t-0.33)/0.33*255); g2 = 255; b2 = Math.round(255*(1-(t-0.33)/0.33)); }
          else               { r2 = 255; g2 = Math.round(255*(1-(t-0.66)/0.34)); b2 = 0; }
          data[i]   = r2;
          data[i+1] = g2;
          data[i+2] = b2;
          data[i+3] = Math.round(alpha * 0.85);
        }
        ctx.putImageData(imageData, 0, 0);
      }
    }

    // ── Map init ───────────────────────────────────────────────────────────
    async function initMap() {
      const { Map } = await google.maps.importLibrary('maps');

      map = new Map(document.getElementById('map'), {
        center: { lat: 39.5, lng: -98.35 },
        zoom: 4,
        mapTypeId: 'roadmap',
        zoomControl: true,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        styles: [
          { elementType: 'geometry',         stylers: [{ color: '#0D1B2A' }] },
          { elementType: 'labels.text.fill', stylers: [{ color: '#8899AA' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#0D1B2A' }] },
          { featureType: 'road',             elementType: 'geometry',       stylers: [{ color: '#1A2D40' }] },
          { featureType: 'road',             elementType: 'geometry.stroke',stylers: [{ color: '#0D1B2A' }] },
          { featureType: 'road.highway',     elementType: 'geometry',       stylers: [{ color: '#1F3850' }] },
          { featureType: 'water',            elementType: 'geometry',       stylers: [{ color: '#0A1520' }] },
          { featureType: 'poi',              stylers: [{ visibility: 'off' }] },
          { featureType: 'transit',          stylers: [{ visibility: 'off' }] },
          { featureType: 'administrative',   elementType: 'geometry.stroke', stylers: [{ color: '#1E3048' }] },
          { featureType: 'landscape',        elementType: 'geometry',       stylers: [{ color: '#111F2E' }] },
        ],
      });

      // Redraw heatmap on pan/zoom, and check whether we've crossed into/out
      // of close-zoom precise viewport mode (debounced — bounds_changed
      // fires repeatedly during a drag/zoom gesture).
      map.addListener('bounds_changed', () => {
        if (viewMode === 'heat' && canvasOverlay) canvasOverlay._overlay.draw();
        scheduleViewportCheck();
      });

      // Load data — one small fetch instead of a 100K-document Firestore scan.
      try {
        const res = await fetch(HEATMAP_DATA_URL);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const data = await res.json();

        heatCells = data.cells || [];
        aggregateCells = heatCells;
        heatmapMeta = {
          generatedAt:  data.generatedAt,
          totalsByType: data.totalsByType,
          totalProperties: data.totalProperties,
        };

        renderMap();
        updateStats();
        updateFreshnessNote();
        document.getElementById('loading-overlay').classList.add('hidden');
      } catch(e) {
        console.error('Heatmap data fetch error:', e);
        showError('Could not load property data: ' + e.message);
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }

    // ── Close-zoom precise viewport mode ──────────────────────────────────────
    function scheduleViewportCheck() {
      clearTimeout(viewportFetchTimer);
      viewportFetchTimer = setTimeout(handleViewportCheck, 400);
    }

    async function handleViewportCheck() {
      const zoom = map.getZoom();

      if (zoom >= VIEWPORT_QUERY_MIN_ZOOM) {
        const bounds = map.getBounds();
        if (!bounds) return;
        const ne = bounds.getNorthEast(), sw = bounds.getSouthWest();
        const token = ++viewportFetchToken;

        try {
          const url = `${VIEWPORT_DATA_URL}?minLat=${sw.lat()}&maxLat=${ne.lat()}&minLng=${sw.lng()}&maxLng=${ne.lng()}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`Server returned ${res.status}`);
          const data = await res.json();

          if (token !== viewportFetchToken) return; // a newer request has already superseded this one

          heatCells = (data.properties || []).map(p => ({
            lat: p.lat, lng: p.lng,
            rock:    p.type === 'rock'    ? 1 : 0,
            coal:    p.type === 'coal'    ? 1 : 0,
            gold:    p.type === 'gold'    ? 1 : 0,
            diamond: p.type === 'diamond' ? 1 : 0,
          }));
          dataMode = 'viewport';
          renderMap();
          updateStats();
          updateFreshnessNote(!!data.truncated);
        } catch(e) {
          // Non-fatal — this is a background precision upgrade, not the
          // primary load path. Leave whatever's currently showing in place
          // rather than surfacing an error banner over it.
          console.error('Viewport data fetch error:', e);
        }
      } else if (dataMode !== 'aggregate') {
        heatCells = aggregateCells;
        dataMode = 'aggregate';
        renderMap();
        updateStats();
        updateFreshnessNote();
      }
    }

    // ── Render ─────────────────────────────────────────────────────────────
    // Each cell already carries per-type counts (rock/coal/gold/diamond) from
    // the server-side bucketing — filtering by type is just picking which
    // count(s) contribute to a cell's weight, no per-property data needed.
    function filteredCells() {
      return heatCells
        .map(c => {
          const weight = activeFilter === 'all'
            ? c.rock + c.coal + c.gold + c.diamond
            : (c[activeFilter] || 0);
          return { lat: c.lat, lng: c.lng, weight, cell: c };
        })
        .filter(c => c.weight > 0);
    }

    function renderMap() {
      const cells = filteredCells();
      clearDots();
      if (canvasOverlay) { canvasOverlay.remove(); canvasOverlay = null; }

      if (viewMode === 'heat') {
        canvasOverlay = new HeatCanvas(map);
        canvasOverlay.setPoints(cells);
      } else {
        renderDots(cells);
      }
    }

    // Jul 17, 2026: one marker per occupied grid cell (dozens-to-thousands,
    // even at 100K+ properties) instead of one marker per property (which
    // would mean up to 100K native google.maps.Marker DOM objects — enough
    // to hang the browser well before Firestore read cost was ever the
    // bottleneck). Marker size now reflects how many properties are in that
    // cell rather than representing one exact property location.
    function renderDots(cells) {
      cells.forEach(c => {
        const dominant = activeFilter !== 'all'
          ? activeFilter
          : Object.entries({ rock: c.cell.rock, coal: c.cell.coal, gold: c.cell.gold, diamond: c.cell.diamond })
              .sort((a, b) => b[1] - a[1])[0][0];
        const color = MINE_COLORS[dominant] || '#4FC3F7';
        const scale = Math.max(4, Math.min(16, 4 + Math.sqrt(c.weight) * 1.5));
        const marker = new google.maps.Marker({
          position: { lat: c.lat, lng: c.lng },
          map,
          title: `${c.weight.toLocaleString()} propert${c.weight === 1 ? 'y' : 'ies'} in this area`,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale,
            fillColor: color,
            fillOpacity: 0.75,
            strokeColor: 'rgba(0,0,0,0.3)',
            strokeWeight: 1,
          },
        });
        dotMarkers.push(marker);
      });
    }

    function clearDots() {
      dotMarkers.forEach(m => m.setMap(null));
      dotMarkers = [];
    }

    // ── Stats ──────────────────────────────────────────────────────────────
    function updateStats() {
      const cells = filteredCells();
      // In viewport mode the global totalsByType/totalProperties figures
      // describe the whole world, not what's currently visible — always
      // derive the total from the actual points we have in that mode.
      const total = dataMode === 'viewport'
        ? cells.reduce((sum, c) => sum + c.weight, 0)
        : activeFilter === 'all'
          ? (heatmapMeta?.totalProperties ?? cells.reduce((sum, c) => sum + c.weight, 0))
          : (heatmapMeta?.totalsByType?.[activeFilter] ?? cells.reduce((sum, c) => sum + c.weight, 0));
      document.getElementById('stat-total').textContent = total.toLocaleString();
      document.getElementById('stat-cities').textContent = cells.length.toLocaleString();
    }

    function updateFreshnessNote(truncated) {
      const el = document.getElementById('freshness-note');
      if (!el) return;
      if (dataMode === 'viewport') {
        el.textContent = truncated
          ? 'Live view — zoom in further for full precision'
          : 'Live view (zoomed in)';
        return;
      }
      if (!heatmapMeta?.generatedAt) return;
      const mins = Math.max(0, Math.round((Date.now() - new Date(heatmapMeta.generatedAt).getTime()) / 60000));
      el.textContent = mins < 1 ? 'Updated just now' : `Updated ${mins}m ago`;
    }

    // ── Filters ────────────────────────────────────────────────────────────
    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.type;
      renderMap();
      updateStats();
    });

    // ── View toggle ────────────────────────────────────────────────────────
    document.getElementById('btn-heat').addEventListener('click', () => {
      viewMode = 'heat';
      document.getElementById('btn-heat').classList.add('active');
      document.getElementById('btn-dots').classList.remove('active');
      updateLegend();
      renderMap();
    });
    document.getElementById('btn-dots').addEventListener('click', () => {
      viewMode = 'dots';
      document.getElementById('btn-dots').classList.add('active');
      document.getElementById('btn-heat').classList.remove('active');
      updateLegend();
      renderMap();
    });

    function updateLegend() {
      const legend = document.getElementById('legend');
      if (viewMode === 'heat') {
        legend.innerHTML = `<div class="legend-title">Density</div><div class="legend-gradient"></div><div class="legend-gradient-labels"><span>Low</span><span>High</span></div>`;
      } else {
        legend.innerHTML = `
          <div class="legend-title">Mine Type</div>
          <div class="legend-row"><span class="dot dot-rock"></span> Rock</div>
          <div class="legend-row"><span class="dot dot-coal"></span> Coal</div>
          <div class="legend-row"><span class="dot dot-gold"></span> Gold</div>
          <div class="legend-row"><span class="dot dot-diamond"></span> Diamond</div>`;
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.style.display = 'block';
    }

    window.initMap = initMap;
  </script>

  <!-- No &libraries=visualization needed anymore -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC9jTXIb-HR9qvYueh8cBIs5EFenNPkX4Y&callback=initMap&loading=async"
    async defer>
  </script>

</body>
