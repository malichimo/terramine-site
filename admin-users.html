<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerraMine Admin — Users</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a07;
    --surface: #1a1208;
    --surface2: #241a0d;
    --gold: #c8922a;
    --gold-light: #f0b84a;
    --amber: #e07b20;
    --text: #f0e6d0;
    --text-muted: #8a7560;
    --green: #4caf6e;
    --red: #e05050;
    --blue: #4a9fd4;
    --border: rgba(200,146,42,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { font-size: 28px; }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--gold-light);
    letter-spacing: -0.5px;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .admin-email { font-size: 11px; color: var(--text-muted); }
  .nav-btn {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav-btn:hover { color: var(--gold-light); border-color: var(--gold); }
  .logout-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .logout-btn:hover { color: var(--red); border-color: var(--red); }

  /* Main layout */
  .main { padding: 32px; max-width: 1400px; margin: 0 auto; }
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 32px 0 16px;
  }
  .section-label:first-child { margin-top: 0; }

  /* Search + filter bar */
  .search-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text-muted); }
  .filter-btn {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 9px 14px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--text); }
  .filter-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 500; }
  .user-count-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  /* User table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-count { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; font-weight: 400; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--gold-light); }
  thead th.sorted { color: var(--gold); }
  tbody tr {
    border-bottom: 1px solid rgba(200,146,42,0.06);
    transition: background 0.15s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 11px 16px; color: var(--text); }
  .td-muted { color: var(--text-muted); }
  .td-gold { color: var(--gold-light); font-weight: 500; }
  .td-green { color: var(--green); }
  .td-red { color: var(--red); }
  .badge {
    display: inline-block;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-red { background: rgba(224,80,80,0.15); color: var(--red); }
  .badge-green { background: rgba(76,175,110,0.15); color: var(--green); }
  .badge-amber { background: rgba(224,123,32,0.15); color: var(--amber); }
  .badge-blue { background: rgba(74,159,212,0.15); color: var(--blue); }
  .badge-muted { background: rgba(138,117,96,0.1); color: var(--text-muted); }

  /* Skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 14px;
    width: 60%;
    display: inline-block;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }

  /* ── Modal ─────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
    overflow-y: auto;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 820px;
    position: relative;
  }
  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--gold-light);
  }
  .modal-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .modal-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: color 0.2s, border-color 0.2s;
  }
  .modal-close:hover { color: var(--red); border-color: var(--red); }
  .modal-body { padding: 24px 28px; }
  .modal-section {
    margin-bottom: 28px;
  }
  .modal-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Stats grid in modal */
  .modal-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 4px;
  }
  .modal-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .modal-stat-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .modal-stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }

  /* Editable field */
  .edit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .edit-label {
    font-size: 11px;
    color: var(--text-muted);
    width: 130px;
    flex-shrink: 0;
  }
  .edit-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .edit-input:focus { border-color: var(--gold); }
  .edit-save-btn {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .edit-save-btn:hover { background: var(--gold-light); }
  .edit-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .save-ok { font-size: 11px; color: var(--green); display: none; }
  .save-err { font-size: 11px; color: var(--red); display: none; }

  /* Ban toggle */
  .ban-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(224,80,80,0.06);
    border: 1px solid rgba(224,80,80,0.2);
    border-radius: 10px;
    padding: 14px 18px;
    gap: 16px;
  }
  .ban-info { flex: 1; }
  .ban-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 4px; }
  .ban-desc { font-size: 11px; color: var(--text-muted); }
  .ban-btn {
    border: none;
    padding: 9px 20px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .ban-btn.do-ban { background: var(--red); color: white; }
  .ban-btn.do-ban:hover { background: #c03030; }
  .ban-btn.do-unban { background: var(--green); color: var(--bg); }
  .ban-btn.do-unban:hover { background: #3a9a5a; }

  /* Properties list in modal */
  .prop-list { display: flex; flex-direction: column; gap: 6px; }
  .prop-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
  }
  .prop-item input[type=checkbox] { accent-color: var(--red); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
  .prop-info { flex: 1; }
  .prop-id { font-size: 10px; color: var(--text-muted); }
  .prop-mine { font-size: 13px; }
  .prop-date { font-size: 10px; color: var(--text-muted); }
  .delete-selected-btn {
    background: var(--red);
    color: white;
    border: none;
    padding: 9px 18px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    display: none;
  }
  .delete-selected-btn:hover { background: #c03030; }

  /* Check-ins list in modal */
  .checkin-list { display: flex; flex-direction: column; gap: 6px; max-height: 400px; overflow-y: auto; }
  .checkin-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
  }
  .checkin-item input[type=checkbox] { accent-color: var(--red); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; margin-top: 2px; }
  .checkin-info { flex: 1; }
  .checkin-time { font-size: 10px; color: var(--text-muted); }
  .checkin-prop { font-size: 11px; color: var(--text-muted); }
  .checkin-msg { font-size: 12px; color: var(--text); margin-top: 2px; }
  .checkin-photo { font-size: 10px; color: var(--blue); }
  .checkin-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .select-all-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .select-all-btn:hover { border-color: var(--gold); color: var(--text); }

  /* Empty states */
  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-size: 12px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* Loading */
  .modal-loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* Login overlay */
  #loginOverlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex; align-items: center; justify-content: center;
  }

  @media (max-width: 768px) {
    .main { padding: 16px; }
    .modal { max-width: 100%; }
    .modal-stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-icon">⛏️</span>
    <div>
      <div class="logo-text">TerraMine</div>
      <div class="logo-sub">User Management</div>
    </div>
  </div>
  <div class="header-right">
    <span class="admin-email" id="adminEmail"></span>
    <a href="admin.html" class="nav-btn">← Dashboard</a>
    <a href="admin-properties.html" class="nav-btn">🏔 Properties</a>
    <a href="admin-finance.html" class="nav-btn">💰 Finance</a>
    <button class="logout-btn" id="logoutBtn" onclick="doLogout()" style="display:none;">Sign Out</button>
  </div>
</div>

<div class="main">
  <div class="section-label">All Users</div>

  <!-- Search + filters -->
  <div class="search-bar">
    <input class="search-input" id="searchInput" type="text" placeholder="Search by nickname, email, or UID..." oninput="applyFilters()">
    <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-f="banned" onclick="setFilter('banned',this)">🚫 Banned</button>
    <button class="filter-btn" data-f="active" onclick="setFilter('active',this)">✅ Active 7d</button>
    <button class="filter-btn" data-f="noprops" onclick="setFilter('noprops',this)">No Props</button>
    <span class="user-count-label" id="userCountLabel">Loading...</span>
  </div>

  <!-- Users table -->
  <div class="table-card">
    <div class="table-header">
      Players
      <span class="table-count" id="tableCount">—</span>
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('nickname')">Nickname ↕</th>
          <th onclick="sortBy('email')">Email ↕</th>
          <th onclick="sortBy('tbBalance')">TB Balance ↕</th>
          <th onclick="sortBy('totalCheckIns')">Check-ins ↕</th>
          <th onclick="sortBy('propCount')">Properties ↕</th>
          <th onclick="sortBy('lastActiveAt')">Last Active ↕</th>
          <th onclick="sortBy('createdAt')">Account Age ↕</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="userTableBody">
        <tr><td colspan="8" style="padding:24px;color:var(--text-muted);font-size:12px;">Loading users...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- User detail modal -->
<div class="modal-overlay" id="userModal" style="display:none;" onclick="handleModalClick(event)">
  <div class="modal" id="modalInner">

    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalNickname">—</div>
        <div class="modal-subtitle" id="modalEmail">—</div>
        <div style="margin-top:6px;" id="modalBadges"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-body" id="modalBody">
      <div class="modal-loading">Loading user data...</div>
    </div>
  </div>
</div>

<!-- Login overlay -->
<div id="loginOverlay">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;text-align:center;">
    <div style="font-size:36px;margin-bottom:16px;">⛏️</div>
    <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--gold-light);margin-bottom:4px;">TerraMine Admin</div>
    <div style="font-size:11px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:32px;">Sign in to continue</div>
    <input id="loginEmail" type="email" placeholder="Email" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;margin-bottom:12px;outline:none;">
    <input id="loginPass" type="password" placeholder="Password" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;margin-bottom:20px;outline:none;">
    <button onclick="doLogin()" style="width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;">Sign In</button>
    <div id="loginError" style="color:var(--red);font-size:12px;margin-top:12px;display:none;"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  import {
    getFirestore, collection, getDocs, query, orderBy, limit, where,
    doc, getDoc, setDoc, deleteDoc, updateDoc, writeBatch
  } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC9jTXIb-HR9qvYueh8cBIs5EFenNPkX4Y",
    authDomain: "terramine-5cda5.firebaseapp.com",
    projectId: "terramine-5cda5",
    storageBucket: "terramine-5cda5.firebasestorage.app",
    messagingSenderId: "183143680304",
    appId: "1:183143680304:web:16bcd69f0c33d690e8e0f5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ── Auth ──────────────────────────────────────────────────────
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'inline-block';
      document.getElementById('adminEmail').textContent = user.email;
      loadUsers();
    }
  });

  window.doLogout = async () => {
    await signOut(auth);
    document.getElementById('loginOverlay').style.display = 'flex';
  };

  window.doLogin = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      errEl.textContent = 'Invalid email or password.';
      errEl.style.display = 'block';
    }
  };
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });

  // ── Helpers ───────────────────────────────────────────────────
  function fmt(n) {
    if (n == null) return '—';
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return Number(n).toLocaleString();
  }
  function timeAgo(iso) {
    if (!iso) return 'Never';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    if (diff < 2592000) return Math.floor(diff/86400) + 'd ago';
    return Math.floor(diff/2592000) + 'mo ago';
  }
  function shortDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' });
  }
  function mineEmoji(t) {
    return { rock:'🪨', coal:'⚫', gold:'🟡', diamond:'💎' }[t] || '⛏️';
  }
  function truncate(s, n) {
    if (!s) return '—';
    return s.length > n ? s.substring(0,n) + '…' : s;
  }

  // ── State ─────────────────────────────────────────────────────
  let allUsers = [];
  let propsByOwner = {};
  let activeFilter = 'all';
  let sortKey = 'lastActiveAt';
  let sortDir = -1; // -1 = desc
  let currentUserId = null;

  // ── Load all users + property counts ─────────────────────────
  async function loadUsers() {
    try {
      const [usersSnap, propsSnap] = await Promise.all([
        getDocs(collection(db, 'users')),
        getDocs(collection(db, 'properties'))
      ]);

      // Build property count per owner
      propsByOwner = {};
      propsSnap.docs.forEach(d => {
        const data = d.data();
        if (data.ownerId) {
          if (!propsByOwner[data.ownerId]) propsByOwner[data.ownerId] = [];
          propsByOwner[data.ownerId].push({ id: d.id, ...data });
        }
      });

      allUsers = usersSnap.docs.map(d => ({
        id: d.id,
        ...d.data(),
        propCount: (propsByOwner[d.id] || []).length
      }));

      applyFilters();
    } catch(e) {
      console.error('loadUsers failed:', e);
      document.getElementById('userTableBody').innerHTML =
        '<tr><td colspan="8" style="padding:24px;color:var(--red);font-size:12px;">Failed to load users — see console</td></tr>';
    }
  }

  // ── Filter + sort + render table ─────────────────────────────
  window.setFilter = (f, btn) => {
    activeFilter = f;
    document.querySelectorAll('[data-f]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  };

  window.applyFilters = () => {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const now = Date.now();
    const day7 = now - 7 * 86400000;

    let filtered = allUsers.filter(u => {
      // Filter
      if (activeFilter === 'banned' && !u.isBanned) return false;
      if (activeFilter === 'active') {
        const last = u.lastActiveAt ? new Date(u.lastActiveAt).getTime() : 0;
        if (last < day7) return false;
      }
      if (activeFilter === 'noprops' && u.propCount > 0) return false;

      // Search
      if (q) {
        const nick = (u.nickname || '').toLowerCase();
        const email = (u.email || '').toLowerCase();
        const uid = u.id.toLowerCase();
        if (!nick.includes(q) && !email.includes(q) && !uid.includes(q)) return false;
      }
      return true;
    });

    // Sort
    filtered.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (sortKey === 'lastActiveAt' || sortKey === 'createdAt') {
        av = av ? new Date(av).getTime() : 0;
        bv = bv ? new Date(bv).getTime() : 0;
      }
      av = av ?? 0; bv = bv ?? 0;
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });

    document.getElementById('tableCount').textContent = filtered.length + ' users';
    document.getElementById('userCountLabel').textContent = filtered.length + ' of ' + allUsers.length + ' users';
    renderTable(filtered);
  };

  window.sortBy = (key) => {
    if (sortKey === key) sortDir *= -1;
    else { sortKey = key; sortDir = -1; }
    applyFilters();
  };

  function renderTable(users) {
    if (!users.length) {
      document.getElementById('userTableBody').innerHTML =
        '<tr><td colspan="8" style="padding:24px;color:var(--text-muted);font-size:12px;">No users match this filter.</td></tr>';
      return;
    }
    document.getElementById('userTableBody').innerHTML = users.map(u => {
      const banned = u.isBanned ? '<span class="badge badge-red">BANNED</span>' : '';
      const adult = u.isAdult ? '' : '<span class="badge badge-blue">MINOR</span>';
      const statusBadge = banned || adult || '<span class="badge badge-muted">OK</span>';
      const tb = u.tbBalance ?? 0;
      const ci = u.totalCheckIns ?? 0;
      return `<tr onclick="openUser('${u.id}')">
        <td class="td-gold">${truncate(u.nickname || '(no nickname)', 20)}</td>
        <td class="td-muted">${truncate(u.email || '—', 28)}</td>
        <td>${fmt(tb)}</td>
        <td ${ci > 500 ? 'class="td-red"' : ''}>${fmt(ci)}</td>
        <td>${u.propCount || 0}</td>
        <td class="td-muted">${timeAgo(u.lastActiveAt)}</td>
        <td class="td-muted">${u.createdAt ? shortDate(u.createdAt) : '—'}</td>
        <td>${statusBadge}</td>
      </tr>`;
    }).join('');
  }

  // ── Open user modal ───────────────────────────────────────────
  window.openUser = async (uid) => {
    currentUserId = uid;
    const user = allUsers.find(u => u.id === uid);
    if (!user) return;

    document.getElementById('modalNickname').textContent = user.nickname || '(no nickname)';
    document.getElementById('modalEmail').textContent = user.email || uid;

    const badges = [];
    if (user.isBanned) badges.push('<span class="badge badge-red">🚫 BANNED</span>');
    if (!user.isAdult) badges.push('<span class="badge badge-blue">MINOR</span>');
    if (user.milestone_firstPurchase) badges.push('<span class="badge badge-green">HAS PROPERTY</span>');
    document.getElementById('modalBadges').innerHTML = badges.join(' ');

    document.getElementById('userModal').style.display = 'flex';
    document.getElementById('modalBody').innerHTML = '<div class="modal-loading">⏳ Loading user data...</div>';

    try {
      // Load check-ins made BY this user
      const checkInsSnap = await getDocs(
        query(collection(db, 'checkIns'),
          where('userId', '==', uid),
          orderBy('timestamp', 'desc'),
          limit(50))
      );
      const checkIns = checkInsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      renderModal(user, propsByOwner[uid] || [], checkIns);
    } catch(e) {
      console.error('Failed to load user detail:', e);
      // Render modal without check-ins if query fails (missing index)
      renderModal(user, propsByOwner[uid] || [], []);
    }
  };

  function renderModal(user, props, checkIns) {
    const uid = user.id;

    document.getElementById('modalBody').innerHTML = `

      <!-- Stats -->
      <div class="modal-section">
        <div class="modal-section-title">Overview</div>
        <div class="modal-stats">
          <div class="modal-stat">
            <div class="modal-stat-label">TB Balance</div>
            <div class="modal-stat-value" style="color:var(--gold-light)">${fmt(user.tbBalance)}</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Check-ins</div>
            <div class="modal-stat-value" style="${(user.totalCheckIns||0)>500?'color:var(--red)':''}">${fmt(user.totalCheckIns)}</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Properties</div>
            <div class="modal-stat-value">${props.length}</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">USD Earned</div>
            <div class="modal-stat-value" style="font-size:16px;">$${Number(user.usdEarnings||0).toFixed(6)}</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Streak</div>
            <div class="modal-stat-value">${user.checkInStreakCount||0}d</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Last Active</div>
            <div class="modal-stat-value" style="font-size:14px;">${timeAgo(user.lastActiveAt)}</div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:10px;color:var(--text-muted);">
          UID: ${uid} &nbsp;·&nbsp; Joined: ${shortDate(user.createdAt)} &nbsp;·&nbsp;
          Referral Code: ${user.referralCode||'—'} &nbsp;·&nbsp;
          Referred By: ${user.referredByCode||'none'}
        </div>
      </div>

      <!-- Edit fields -->
      <div class="modal-section">
        <div class="modal-section-title">Edit Values</div>

        <div class="edit-row">
          <span class="edit-label">Nickname</span>
          <input class="edit-input" id="edit-nickname" type="text" value="${user.nickname||''}" placeholder="nickname">
          <button class="edit-save-btn" onclick="saveField('${uid}','nickname','edit-nickname','text','ok-nickname','err-nickname')">Save</button>
          <span class="save-ok" id="ok-nickname">✓</span>
          <span class="save-err" id="err-nickname">✗</span>
        </div>

        <div class="edit-row">
          <span class="edit-label">TB Balance</span>
          <input class="edit-input" id="edit-tb" type="number" value="${user.tbBalance||0}" min="0">
          <button class="edit-save-btn" onclick="saveField('${uid}','tbBalance','edit-tb','number','ok-tb','err-tb')">Save</button>
          <span class="save-ok" id="ok-tb">✓</span>
          <span class="save-err" id="err-tb">✗</span>
        </div>

        <div class="edit-row">
          <span class="edit-label">USD Earnings</span>
          <input class="edit-input" id="edit-usd" type="number" value="${user.usdEarnings||0}" step="0.000001" min="0">
          <button class="edit-save-btn" onclick="saveField('${uid}','usdEarnings','edit-usd','number','ok-usd','err-usd')">Save</button>
          <span class="save-ok" id="ok-usd">✓</span>
          <span class="save-err" id="err-usd">✗</span>
        </div>

        <div class="edit-row">
          <span class="edit-label">Total Check-ins</span>
          <input class="edit-input" id="edit-ci" type="number" value="${user.totalCheckIns||0}" min="0">
          <button class="edit-save-btn" onclick="saveField('${uid}','totalCheckIns','edit-ci','number','ok-ci','err-ci')">Save</button>
          <span class="save-ok" id="ok-ci">✓</span>
          <span class="save-err" id="err-ci">✗</span>
        </div>
      </div>

      <!-- Ban control -->
      <div class="modal-section">
        <div class="modal-section-title">Account Status</div>
        <div class="ban-row" id="banRow">
          <div class="ban-info">
            <div class="ban-title">${user.isBanned ? '🚫 This account is banned' : '⚠️ Ban this account'}</div>
            <div class="ban-desc">${user.isBanned
              ? 'User will be signed out immediately on next app open.'
              : 'Banning blocks this user from accessing the app. Reversible anytime.'}</div>
          </div>
          <button class="ban-btn ${user.isBanned ? 'do-unban' : 'do-ban'}"
            onclick="toggleBan('${uid}', ${!user.isBanned})">
            ${user.isBanned ? '✓ Unban User' : '🚫 Ban User'}
          </button>
        </div>
      </div>

      <!-- Properties -->
      <div class="modal-section">
        <div class="modal-section-title">Properties (${props.length})</div>
        ${props.length === 0
          ? '<div class="empty-state"><div class="empty-icon">🏚️</div>No properties owned</div>'
          : `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
              <button class="select-all-btn" onclick="toggleSelectAllProps()">Select All</button>
              <button class="delete-selected-btn" id="deletePropBtn" onclick="deleteSelectedProps('${uid}')">🗑 Delete Selected</button>
            </div>
            <div class="prop-list">
              ${props.map(p => `
                <div class="prop-item">
                  <input type="checkbox" class="prop-checkbox" data-id="${p.id}" onchange="updatePropDeleteBtn()">
                  <div class="prop-info">
                    <div class="prop-mine">${mineEmoji(p.mineType)} ${p.mineType || '—'} mine</div>
                    <div class="prop-id">${p.id}</div>
                    <div class="prop-date">Purchased: ${shortDate(p.purchasedAt)}</div>
                  </div>
                </div>`).join('')}
            </div>`}
      </div>

      <!-- Check-ins -->
      <div class="modal-section">
        <div class="modal-section-title">Recent Check-ins by This User (showing up to 50)</div>
        ${checkIns.length === 0
          ? '<div class="empty-state"><div class="empty-icon">📍</div>No check-ins found</div>'
          : `<div class="checkin-actions">
              <button class="select-all-btn" onclick="toggleSelectAllCheckIns()">Select All</button>
              <button class="delete-selected-btn" id="deleteCheckInBtn" onclick="deleteSelectedCheckIns()">🗑 Delete Selected</button>
            </div>
            <div class="checkin-list">
              ${checkIns.map(c => `
                <div class="checkin-item">
                  <input type="checkbox" class="checkin-checkbox" data-id="${c.id}" onchange="updateCheckInDeleteBtn()">
                  <div class="checkin-info">
                    <div class="checkin-time">${timeAgo(c.timestamp?.toDate ? c.timestamp.toDate().toISOString() : c.timestamp)}</div>
                    <div class="checkin-prop">📍 ${c.propertyId || '—'}</div>
                    ${c.message ? `<div class="checkin-msg">"${c.message}"</div>` : ''}
                    ${c.photoUrl ? `<div class="checkin-photo">📷 Has photo</div>` : ''}
                  </div>
                </div>`).join('')}
            </div>`}
      </div>
    `;
  }

  // ── Save a field ──────────────────────────────────────────────
  window.saveField = async (uid, field, inputId, type, okId, errId) => {
    const input = document.getElementById(inputId);
    const okEl = document.getElementById(okId);
    const errEl = document.getElementById(errId);
    okEl.style.display = 'none';
    errEl.style.display = 'none';

    let value = input.value;
    if (type === 'number') value = Number(value);

    try {
      await setDoc(doc(db, 'users', uid), { [field]: value }, { merge: true });
      // Update local cache
      const u = allUsers.find(u => u.id === uid);
      if (u) u[field] = value;
      okEl.style.display = 'inline';
      setTimeout(() => okEl.style.display = 'none', 2000);
    } catch(e) {
      console.error('saveField failed:', e);
      errEl.textContent = '✗ Failed';
      errEl.style.display = 'inline';
    }
  };

  // ── Ban / unban ───────────────────────────────────────────────
  window.toggleBan = async (uid, ban) => {
    const confirmed = confirm(ban
      ? `Ban this user? They will be locked out on next app open.`
      : `Unban this user? They will regain access immediately.`);
    if (!confirmed) return;

    try {
      await setDoc(doc(db, 'users', uid), { isBanned: ban }, { merge: true });
      const u = allUsers.find(u => u.id === uid);
      if (u) u.isBanned = ban;

      // Re-render ban row
      document.getElementById('banRow').outerHTML = `
        <div class="ban-row" id="banRow">
          <div class="ban-info">
            <div class="ban-title">${ban ? '🚫 This account is banned' : '⚠️ Ban this account'}</div>
            <div class="ban-desc">${ban
              ? 'User will be signed out immediately on next app open.'
              : 'Banning blocks this user from accessing the app. Reversible anytime.'}</div>
          </div>
          <button class="ban-btn ${ban ? 'do-unban' : 'do-ban'}"
            onclick="toggleBan('${uid}', ${!ban})">
            ${ban ? '✓ Unban User' : '🚫 Ban User'}
          </button>
        </div>`;

      // Update badges
      const badges = [];
      if (ban) badges.push('<span class="badge badge-red">🚫 BANNED</span>');
      document.getElementById('modalBadges').innerHTML = badges.join(' ');
    } catch(e) {
      console.error('toggleBan failed:', e);
      alert('Failed to update ban status — see console');
    }
  };

  // ── Property deletion ─────────────────────────────────────────
  window.updatePropDeleteBtn = () => {
    const checked = document.querySelectorAll('.prop-checkbox:checked').length;
    const btn = document.getElementById('deletePropBtn');
    if (btn) btn.style.display = checked > 0 ? 'inline-block' : 'none';
    if (btn) btn.textContent = `🗑 Delete ${checked} Selected`;
  };

  window.toggleSelectAllProps = () => {
    const boxes = document.querySelectorAll('.prop-checkbox');
    const anyUnchecked = [...boxes].some(b => !b.checked);
    boxes.forEach(b => b.checked = anyUnchecked);
    updatePropDeleteBtn();
  };

  window.deleteSelectedProps = async (uid) => {
    const checked = [...document.querySelectorAll('.prop-checkbox:checked')];
    if (!checked.length) return;
    const confirmed = confirm(`Permanently delete ${checked.length} propert${checked.length===1?'y':'ies'}? This cannot be undone.`);
    if (!confirmed) return;

    try {
      const batch = writeBatch(db);
      checked.forEach(cb => batch.delete(doc(db, 'properties', cb.dataset.id)));
      await batch.commit();

      // Update local cache
      const ids = checked.map(cb => cb.dataset.id);
      if (propsByOwner[uid]) propsByOwner[uid] = propsByOwner[uid].filter(p => !ids.includes(p.id));
      const u = allUsers.find(u => u.id === uid);
      if (u) u.propCount = (propsByOwner[uid]||[]).length;

      // Remove rows from UI
      checked.forEach(cb => cb.closest('.prop-item').remove());
      document.getElementById('deletePropBtn').style.display = 'none';
    } catch(e) {
      console.error('deleteProps failed:', e);
      alert('Failed to delete properties — see console');
    }
  };

  // ── Check-in deletion ─────────────────────────────────────────
  window.updateCheckInDeleteBtn = () => {
    const checked = document.querySelectorAll('.checkin-checkbox:checked').length;
    const btn = document.getElementById('deleteCheckInBtn');
    if (btn) btn.style.display = checked > 0 ? 'inline-block' : 'none';
    if (btn) btn.textContent = `🗑 Delete ${checked} Selected`;
  };

  window.toggleSelectAllCheckIns = () => {
    const boxes = document.querySelectorAll('.checkin-checkbox');
    const anyUnchecked = [...boxes].some(b => !b.checked);
    boxes.forEach(b => b.checked = anyUnchecked);
    updateCheckInDeleteBtn();
  };

  window.deleteSelectedCheckIns = async () => {
    const checked = [...document.querySelectorAll('.checkin-checkbox:checked')];
    if (!checked.length) return;
    const confirmed = confirm(`Permanently delete ${checked.length} check-in${checked.length===1?'':'s'}? This cannot be undone.`);
    if (!confirmed) return;

    try {
      const batch = writeBatch(db);
      checked.forEach(cb => batch.delete(doc(db, 'checkIns', cb.dataset.id)));
      await batch.commit();

      checked.forEach(cb => cb.closest('.checkin-item').remove());
      document.getElementById('deleteCheckInBtn').style.display = 'none';
    } catch(e) {
      console.error('deleteCheckIns failed:', e);
      alert('Failed to delete check-ins — see console');
    }
  };

  // ── Modal close ───────────────────────────────────────────────
  window.closeModal = () => {
    document.getElementById('userModal').style.display = 'none';
    currentUserId = null;
    applyFilters(); // refresh table to reflect any edits
  };

  window.handleModalClick = (e) => {
    if (e.target === document.getElementById('userModal')) closeModal();
  };

</script>
</body>
</html>
